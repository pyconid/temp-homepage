<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyCon Indonesia 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray-mid: #e0e0e0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Glitter canvas ── */
    #glitter {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Subtle diagonal grid ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 40px,
          rgba(0,0,0,0.018) 40px,
          rgba(0,0,0,0.018) 41px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 100px;
      gap: 0;
    }

    /* ── Logo SVG ── */
    .logo-wrap {
      margin-bottom: 48px;
      width: 100%;
      max-width: 520px;
      animation: floatUp 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Decorative rule ── */
    .rule {
      width: 48px;
      height: 2px;
      background: var(--black);
      margin: 28px auto;
      animation: fadeIn 1.1s ease both;
      animation-delay: 0.3s;
    }

    /* ── Headline ── */
    .headline {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-align: center;
      max-width: 700px;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) both;
      animation-delay: 0.15s;
    }

    .headline em {
      font-style: normal;
      position: relative;
      display: inline-block;
    }

    /* underline accent on "2026" */
    .headline em::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0; right: 0;
      height: 3px;
      background: var(--black);
      transform: scaleX(0);
      transform-origin: left;
      animation: drawLine 0.6s ease forwards;
      animation-delay: 1s;
    }

    /* ── Venue / Date block ── */
    .meta {
      margin-top: 20px;
      text-align: center;
      font-size: clamp(0.9rem, 2.2vw, 1.05rem);
      font-weight: 400;
      line-height: 1.8;
      color: #333;
      letter-spacing: 0.01em;
      animation: fadeUp 1s ease both;
      animation-delay: 0.3s;
    }

    .meta strong { font-weight: 600; color: var(--black); }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ccc 30%, #ccc 70%, transparent);
      margin: 60px 0;
      animation: fadeIn 1.2s ease both;
      animation-delay: 0.4s;
    }

    /* ── Section blocks ── */
    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 1s ease both;
    }

    .section:nth-child(5) { animation-delay: 0.5s; }
    .section:nth-child(7) { animation-delay: 0.7s; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
    }

    .section-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.2;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--black);
      background: var(--white);
      border: 1.5px solid var(--black);
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--black);
      transform: translateY(101%);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      z-index: 0;
    }

    .btn span { position: relative; z-index: 1; }
    .btn svg  { position: relative; z-index: 1; transition: stroke 0.25s ease; }

    .btn:hover::before { transform: translateY(0); }
    .btn:hover { color: var(--white); box-shadow: 4px 4px 0 var(--black); transform: translate(-2px, -2px); }
    .btn:hover svg { stroke: var(--white); }
    .btn:active { transform: translate(0,0); box-shadow: none; }

    /* ── Animations ── */
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes drawLine {
      to { transform: scaleX(1); }
    }
    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    /* ── Footer note ── */
    .footer {
      margin-top: 80px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      animation: fadeIn 1.5s ease both;
      animation-delay: 1s;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page { padding: 60px 20px 80px; }
      .btn  { width: 100%; justify-content: center; }
    }
  </style>
</head>

<!-- Glitter / sparkle canvas -->
<script>
(function(){
  const canvas = document.getElementById('glitter');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  // Spawn sparkle
  function Sparkle() {
    this.reset();
  }
  Sparkle.prototype.reset = function() {
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.size = rand(0.5, 2.2);
    this.alpha = 0;
    this.maxAlpha = rand(0.15, 0.5);
    this.speed = rand(0.004, 0.012);
    this.life  = 0;
    this.maxLife = rand(0.4, 1);
    this.phase = 'in'; // in | out
  };
  Sparkle.prototype.update = function() {
    if (this.phase === 'in') {
      this.alpha += this.speed;
      if (this.alpha >= this.maxAlpha) { this.phase = 'out'; }
    } else {
      this.alpha -= this.speed * 0.7;
      if (this.alpha <= 0) { this.reset(); }
    }
  };
  Sparkle.prototype.draw = function() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle = '#000';
    // 4-pointed star
    const s = this.size;
    ctx.translate(this.x, this.y);
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2;
      const inner = s * 0.25;
      const outer = s;
      ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
      const mid = angle + Math.PI / 4;
      ctx.lineTo(Math.cos(mid) * inner, Math.sin(mid) * inner);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  };

  // Init pool
  for (let i = 0; i < 90; i++) {
    const sp = new Sparkle();
    sp.life = rand(0, 1); // stagger start
    particles.push(sp);
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
